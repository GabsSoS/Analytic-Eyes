version: '3.8'

services:
  redis:
    image: redis:7
    container_name: etl-redis

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: etl_db
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock  
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
    networks:
      - etl-network

  worker:
    build: ./backend
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock  
    depends_on:
      - redis
      - postgres
    networks:
      - etl-network

volumes:
  postgres_data:

networks:
  etl-network:
    driver: bridge