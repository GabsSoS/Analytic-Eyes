services:
  redis:
    image: redis:7-alpine
    container_name: etl-redis-prod
    restart: unless-stopped
    networks:
      - etl-network-prod

  etls:
    build: ./etls
    image: etls:latest
    container_name: etl-etls-image
    entrypoint: ["python", "-c", "print('etls image ready')"]
    restart: "no"
    networks:
      - etl-network-prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: etl-backend-prod
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
      python manage.py shell -c \"import os; from django.contrib.auth import get_user_model; User = get_user_model(); username=os.environ.get('DJANGO_SUPERUSER_USERNAME', 'admin'); password=os.environ.get('DJANGO_SUPERUSER_PASSWORD', 'admin123'); email=os.environ.get('DJANGO_SUPERUSER_EMAIL', ''); User.objects.filter(username=username).exists() or User.objects.create_superuser(username, email, password)\" &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings_prod
      SECRET_KEY: change-me-before-public
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: admin123
      DJANGO_SUPERUSER_EMAIL: ""
      ALLOWED_HOSTS: analytic-eyes.com,www.analytic-eyes.com,localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: https://analytic-eyes.com,https://www.analytic-eyes.com,http://localhost,http://127.0.0.1
      CSRF_TRUSTED_ORIGINS: https://analytic-eyes.com,https://www.analytic-eyes.com,http://localhost,http://127.0.0.1
      SQLITE_PATH: /app/data/db.sqlite3
      ETL_DOCKER_NETWORK: etl-manager_etl-network-prod
      ETL_CONTAINER_MEM_LIMIT: 512m
    volumes:
      - backend_data:/app/data
      - backend_static:/app/staticfiles
      - backend_media:/app/media
      - ./etls:/etls
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - etls
    networks:
      - etl-network-prod

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: etl-worker-prod
    restart: unless-stopped
    command: sh -c "celery -A config worker -l info --concurrency=${CELERY_WORKER_CONCURRENCY:-30} --prefetch-multiplier=1 -Ofair --max-tasks-per-child=50"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings_prod
      SECRET_KEY: change-me-before-public
      ALLOWED_HOSTS: analytic-eyes.com,www.analytic-eyes.com,localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: https://analytic-eyes.com,https://www.analytic-eyes.com,http://localhost,http://127.0.0.1
      CSRF_TRUSTED_ORIGINS: https://analytic-eyes.com,https://www.analytic-eyes.com,http://localhost,http://127.0.0.1
      SQLITE_PATH: /app/data/db.sqlite3
      ETL_DOCKER_NETWORK: etl-manager_etl-network-prod
      ETL_CONTAINER_MEM_LIMIT: 512m
      CELERY_WORKER_CONCURRENCY: 30
    volumes:
      - backend_data:/app/data
      - backend_media:/app/media
      - ./etls:/etls
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - etls
      - backend
    networks:
      - etl-network-prod

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: etl-beat-prod
    restart: unless-stopped
    command: celery -A config beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings_prod
      SECRET_KEY: change-me-before-public
      ALLOWED_HOSTS: analytic-eyes.com,www.analytic-eyes.com,localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: https://analytic-eyes.com,https://www.analytic-eyes.com,http://localhost,http://127.0.0.1
      CSRF_TRUSTED_ORIGINS: https://analytic-eyes.com,https://www.analytic-eyes.com,http://localhost,http://127.0.0.1
      SQLITE_PATH: /app/data/db.sqlite3
      ETL_DOCKER_NETWORK: etl-manager_etl-network-prod
      ETL_CONTAINER_MEM_LIMIT: 512m
    volumes:
      - backend_data:/app/data
      - backend_media:/app/media
      - ./etls:/etls
    depends_on:
      - redis
      - backend
    networks:
      - etl-network-prod

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: etl-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - backend_static:/app/staticfiles:ro
      - backend_media:/app/media:ro
    networks:
      - etl-network-prod

volumes:
  backend_data:
  backend_static:
  backend_media:

networks:
  etl-network-prod:
    driver: bridge
